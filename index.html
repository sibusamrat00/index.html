<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Visitor Mood System</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
overflow:hidden;
}

/* RGB BACKGROUND */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(45deg, red, blue, lime, cyan, magenta, yellow);
background-size:400% 400%;
animation:rgb 8s infinite;
z-index:-1;
}

@keyframes rgb{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* BOX */

.box{
background:rgba(0,0,0,0.75);
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px cyan;
opacity:0;
transform:translateY(-60px) scale(0.8);
animation:showBox 1s forwards;
}

@keyframes showBox{
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

input{
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:6px;
cursor:pointer;
background:cyan;
font-weight:bold;
}

button:hover{
background:lime;
}

#namePage,#moodPage,#thanksPage{
display:none;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="box" id="loginPage">

<h2>LOGIN</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">LOGIN</button>

<p id="msg"></p>

</div>

<!-- NAME PAGE -->

<div class="box" id="namePage">

<h2>What is your name?</h2>

<input type="text" id="visitorName" placeholder="Enter your name"><br>

<button onclick="saveName()">NEXT</button>

</div>

<!-- MOOD PAGE -->

<div class="box" id="moodPage">

<h2 id="moodText">How is your mood today?</h2>

<button onclick="nextPage()">😊 Good</button>
<button onclick="nextPage()">😄 Very Good</button>
<button onclick="nextPage()">😞 Bad</button>
<button onclick="nextPage()">😭 Very Bad</button>

</div>

<!-- THANKS PAGE -->

<div class="box" id="thanksPage">

<h2 id="thanksText">Thanks For Feedback</h2>

<p>All The Best 👍</p>

</div>

<script>

let visitor="";

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="SIBU" && pass==="SIBU")
{
document.getElementById("loginPage").style.display="none";
document.getElementById("namePage").style.display="block";
}
else
{
document.getElementById("msg").innerText="Wrong Username or Password";
}

}

function saveName(){

visitor=document.getElementById("visitorName").value;

document.getElementById("namePage").style.display="none";
document.getElementById("moodPage").style.display="block";

document.getElementById("moodText").innerText="How is your mood today, "+visitor+"?";

}

function nextPage(){

document.getElementById("moodPage").style.display="none";
document.getElementById("thanksPage").style.display="block";

document.getElementById("thanksText").innerText="Thanks for feedback, "+visitor+"!";

}

</script>

</body>
</html>
